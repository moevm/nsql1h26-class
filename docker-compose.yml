services:
  db:
    image: arangodb:3.11
    restart: always
    environment:
      - ARANGO_ROOT_PASSWORD=${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/arangodb3
    healthcheck:
      test: ["CMD", "arangosh", "--server.endpoint", "tcp://127.0.0.1:8529", "--server.password", "${DB_PASSWORD}", "--javascript.execute-string", "db._version()"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build: ./backend
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "127.0.0.1:8080:80"
    depends_on:
      - backend

volumes:
  db_data: